# This workflow will run tests using node and then publish a package to GitHub Packages when a release is created
# For more information see: https://docs.github.com/en/actions/publishing-packages/publishing-nodejs-packages

name: Node.js Package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      local: ${{ steps.check.outputs.local }}
      published: ${{ steps.check.outputs.published }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          LOCAL=$(node -p "require('./main/package.json').version")
          PUBLISHED=$(npm view motionrail version 2>/dev/null || echo "none")
          echo "local=$LOCAL" >> $GITHUB_OUTPUT
          echo "published=$PUBLISHED" >> $GITHUB_OUTPUT

  publish-npm:
    needs: check-version
    if: needs.check-version.outputs.local != needs.check-version.outputs.published
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 10.14.0
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org/
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm publish --access public --no-git-checks
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
