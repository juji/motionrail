<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VistaView Lightbox Extension Demo</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 20px;
        background: #0f172a;
        color: white;
      }
      .carousel-wrapper {
        margin-bottom: 60px;
      }
      h2 {
        margin-bottom: 20px;
      }
      .motion-rail-item {
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .motion-rail-item {
        position: relative;
      }
      .motion-rail-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }
      .motion-rail-item::after {
        content: attr(data-label);
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        background: rgba(0, 0, 0, 0.7);
        color: #fff;
        font-size: 11px;
        padding: 4px 8px;
        text-align: center;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <nav
      style="
        position: sticky;
        top: 0;
        z-index: 1000;
        margin-bottom: 30px;
        padding: 20px;
        background: #1a1a1a;
        border-radius: 8px;
      "
    >
      <strong style="color: #667eea; margin-right: 20px">Tests:</strong>
      <a href="../index.html" style="color: #999; margin-right: 15px">Main</a>
      <a href="arrows.html" style="color: #999; margin-right: 15px">Arrows</a>
      <a href="dots.html" style="color: #999; margin-right: 15px">Dots</a>
      <a href="logger.html" style="color: #999; margin-right: 15px">Logger</a>
      <a href="thumbnails.html" style="color: #999; margin-right: 15px"
        >Thumbnails</a
      >
      <a
        href="vistaview.html"
        style="color: #fff; margin-right: 15px; text-decoration: underline"
        >VistaView</a
      >
    </nav>
    <h1>VistaView Lightbox Extension Demo</h1>
    <p style="color: #999; margin-bottom: 30px">
      Click any carousel item to open in a VistaView lightbox.
    </p>

    <div class="carousel-wrapper">
      <h2>Image Carousel</h2>
      <div data-motionrail id="carousel1">
        <div data-motionrail-scrollable>
          <div data-motionrail-grid>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/vista1/800/600"
                ><img
                  src="https://picsum.photos/seed/vista1/400/300"
                  alt="Photo 1"
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/vista2/800/600"
                ><img
                  src="https://picsum.photos/seed/vista2/400/300"
                  alt="Photo 2"
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/vista3/800/600"
                ><img
                  src="https://picsum.photos/seed/vista3/400/300"
                  alt="Photo 3"
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/vista4/800/600"
                ><img
                  src="https://picsum.photos/seed/vista4/400/300"
                  alt="Photo 4"
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/vista5/800/600"
                ><img
                  src="https://picsum.photos/seed/vista5/400/300"
                  alt="Photo 5"
              /></a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="carousel-wrapper">
      <h2>Structure Tests</h2>
      <div data-motionrail id="carousel2">
        <div data-motionrail-scrollable>
          <div data-motionrail-grid>
            <div class="motion-rail-item" data-label="a > img (standard)">
              <a href="https://picsum.photos/seed/s1/800/600"
                ><img
                  src="https://picsum.photos/seed/s1/400/300"
                  alt="Standard"
              /></a>
            </div>
            <div class="motion-rail-item" data-label="img only (no anchor)">
              <img src="https://picsum.photos/seed/s2/400/300" alt="Img only" />
            </div>
            <div class="motion-rail-item" data-label="picture > img">
              <picture>
                <source
                  srcset="https://picsum.photos/seed/s3/800/600"
                  media="(min-width: 768px)"
                />
                <img
                  src="https://picsum.photos/seed/s3/400/300"
                  alt="Picture"
                />
              </picture>
            </div>
            <div class="motion-rail-item" data-label="a > picture > img">
              <a href="https://picsum.photos/seed/s4/800/600">
                <picture>
                  <source srcset="https://picsum.photos/seed/s4/800/600" />
                  <img
                    src="https://picsum.photos/seed/s4/400/300"
                    alt="A picture"
                  />
                </picture>
              </a>
            </div>
            <div
              class="motion-rail-item"
              data-label="div > a > img (deep nest)"
            >
              <div>
                <a href="https://picsum.photos/seed/s5/800/600">
                  <img
                    src="https://picsum.photos/seed/s5/400/300"
                    alt="Deep nest"
                  />
                </a>
              </div>
            </div>
            <div class="motion-rail-item" data-label="a > div > img">
              <a href="https://picsum.photos/seed/s6/800/600">
                <div>
                  <img
                    src="https://picsum.photos/seed/s6/400/300"
                    alt="A div img"
                  />
                </div>
              </a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { MotionRail } from "motionrail";
      import { VistaViewLightbox } from "motionrail/extensions/vistaview";
      import "motionrail/style.css";
      import "vistaview/style.css";

      new MotionRail(document.getElementById("carousel1"), {
        breakpoints: [
          { columns: 1, gap: "16px" },
          { width: 768, columns: 2, gap: "16px" },
          { width: 1024, columns: 3, gap: "20px" },
        ],
        extensions: [VistaViewLightbox()],
      });

      new MotionRail(document.getElementById("carousel2"), {
        breakpoints: [
          { columns: 1, gap: "16px" },
          { width: 768, columns: 2, gap: "16px" },
          { width: 1024, columns: 3, gap: "20px" },
        ],
        extensions: [VistaViewLightbox()],
      });
    </script>
  </body>
</html>
