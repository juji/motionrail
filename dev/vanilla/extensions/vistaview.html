<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VistaView Lightbox Extension Demo</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        padding: 20px;
        background: #0f172a;
        color: white;
      }
      .carousel-wrapper {
        margin-bottom: 60px;
      }
      h2 {
        margin-bottom: 20px;
      }
      .motion-rail-item {
        height: 300px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }
      .motion-rail-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
      }
    </style>
  </head>
  <body>
    <nav
      style="
        position: sticky;
        top: 0;
        z-index: 1000;
        margin-bottom: 30px;
        padding: 20px;
        background: #1a1a1a;
        border-radius: 8px;
      "
    >
      <strong style="color: #667eea; margin-right: 20px">Tests:</strong>
      <a href="../index.html" style="color: #999; margin-right: 15px">Main</a>
      <a href="arrows.html" style="color: #999; margin-right: 15px">Arrows</a>
      <a href="dots.html" style="color: #999; margin-right: 15px">Dots</a>
      <a href="logger.html" style="color: #999; margin-right: 15px">Logger</a>
      <a href="thumbnails.html" style="color: #999; margin-right: 15px"
        >Thumbnails</a
      >
      <a
        href="vistaview.html"
        style="color: #fff; margin-right: 15px; text-decoration: underline"
        >VistaView</a
      >
    </nav>
    <h1>VistaView Lightbox Extension Demo</h1>
    <p style="color: #999; margin-bottom: 30px">
      Click any carousel item to open in a VistaView lightbox.
    </p>

    <div class="carousel-wrapper">
      <h2>Image Carousel</h2>
      <div data-motionrail id="carousel1">
        <div data-motionrail-scrollable>
          <div data-motionrail-grid>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/vista1/800/600"
                ><img
                  src="https://picsum.photos/seed/vista1/400/300"
                  alt="Photo 1"
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/vista2/800/600"
                ><img
                  src="https://picsum.photos/seed/vista2/400/300"
                  alt="Photo 2"
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/vista3/800/600"
                ><img
                  src="https://picsum.photos/seed/vista3/400/300"
                  alt="Photo 3"
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/vista4/800/600"
                ><img
                  src="https://picsum.photos/seed/vista4/400/300"
                  alt="Photo 4"
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/vista5/800/600"
                ><img
                  src="https://picsum.photos/seed/vista5/400/300"
                  alt="Photo 5"
              /></a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="carousel-wrapper">
      <h2>Many Images (12 items)</h2>
      <div data-motionrail id="carousel2">
        <div data-motionrail-scrollable>
          <div data-motionrail-grid>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m1/800/600"
                ><img src="https://picsum.photos/seed/m1/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m2/800/600"
                ><img src="https://picsum.photos/seed/m2/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m3/800/600"
                ><img src="https://picsum.photos/seed/m3/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m4/800/600"
                ><img src="https://picsum.photos/seed/m4/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m5/800/600"
                ><img src="https://picsum.photos/seed/m5/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m6/800/600"
                ><img src="https://picsum.photos/seed/m6/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m7/800/600"
                ><img src="https://picsum.photos/seed/m7/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m8/800/600"
                ><img src="https://picsum.photos/seed/m8/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m9/800/600"
                ><img src="https://picsum.photos/seed/m9/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m10/800/600"
                ><img src="https://picsum.photos/seed/m10/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m11/800/600"
                ><img src="https://picsum.photos/seed/m11/400/300" alt=""
              /></a>
            </div>
            <div class="motion-rail-item">
              <a href="https://picsum.photos/seed/m12/800/600"
                ><img src="https://picsum.photos/seed/m12/400/300" alt=""
              /></a>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script type="module">
      import { MotionRail } from "motionrail";
      import { VistaViewLightbox } from "motionrail/extensions/vistaview";
      import "motionrail/style.css";
      import "vistaview/style.css";

      new MotionRail(document.getElementById("carousel1"), {
        breakpoints: [
          { columns: 1, gap: "16px" },
          { width: 768, columns: 2, gap: "16px" },
          { width: 1024, columns: 3, gap: "20px" },
        ],
        extensions: [VistaViewLightbox()],
      });

      new MotionRail(document.getElementById("carousel2"), {
        breakpoints: [
          { columns: 1, gap: "16px" },
          { width: 768, columns: 2, gap: "16px" },
          { width: 1024, columns: 3, gap: "20px" },
        ],
        extensions: [VistaViewLightbox()],
      });
    </script>
  </body>
</html>
